name: Sync to Hugging Face hub
on:
  push:
    branches: [main]

  # to run every time you want to manually
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://marasinghe3u:$HF_TOKEN@huggingface.co/spaces/marasinghe3u/soil-health-api main
